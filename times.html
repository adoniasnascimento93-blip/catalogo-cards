<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos de Times - Card SUS</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            text-align: center;
        }
        .btn-voltar {
            display: inline-block;
            padding: 10px 20px;
            background-color: #6c757d;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        .grid-fotos {
            display: grid;
            grid-template-columns: 1fr 1fr; /* Exibe duas fotos por linha no celular */
            gap: 15px;
            margin-bottom: 30px;
        }
        .grid-fotos img {
            width: 100%;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn-whats {
            display: block;
            background-color: #25d366;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 10px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-voltar">⬅️ Voltar ao Menu</a>
        <h2>⚽ Modelos: Times do Coração</h2>
        
        <div class="grid-fotos">
            <!-- COLOQUE OS NOMES DAS SUAS FOTOS AQUI ABAIXO -->
            <img src="modelo1.png" alt="Modelo Time 1">
            <img src="modelo2.png" alt="Modelo Time 2">
            <img src="modelo3.png" alt="Modelo Time 3">
            <img src="modelo4.png" alt="Modelo Time 4">
            <img src="modelo5.png" alt="Modelo Time 5">
            <img src="modelo6.png" alt="Modelo Time 6">
            <img src="modelo7.png" alt="Modelo Time 7">
            <img src="modelo8.png" alt="Modelo Time 8">
            <img src="modelo9.png" alt="Modelo Time 9">
            <img src="modelo10.png" alt="Modelo Time 10">
            <img src="modelo11.png" alt="Modelo Time 11">
            <img src="modelo12.png" alt="Modelo Time 12">
            <img src="modelo13.png" alt="Modelo Time 13">
            <img src="modelo14.png" alt="Modelo Time 14">
            <img src="modelo15.png" alt="Modelo Time 15">
            <img src="modelo16.png" alt="Modelo Time 16">
            <img src="modelo17.png" alt="Modelo Time 17">
        </div>

        <a href="https://wa.me/seu-numero-com-ddd" target="_blank" class="btn-whats">💬 Encomendar pelo WhatsApp</a>
    </div>

</body>
</html>
