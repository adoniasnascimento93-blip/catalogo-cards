<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelos Cristãos - Card SUS</title>
    <link rel="stylesheet" href="estilo-catalogo.css">
</head>
<body oncontextmenu="return false;">

    <div class="container">

        <h2>🙏 Modelos: Linha Cristã</h2>
        
        <div class="grid-fotos">
            <div class="card-box"><span class="card-label">cristao 1</span><img src="cristao1.png" alt="Modelo Cristão 1" data-codigo="cristao 1" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 2</span><img src="cristao2.png" alt="Modelo Cristão 2" data-codigo="cristao 2" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 3</span><img src="cristao3.png" alt="Modelo Cristão 3" data-codigo="cristao 3" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 4</span><img src="cristao4.png" alt="Modelo Cristão 4" data-codigo="cristao 4" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 5</span><img src="cristao5.png" alt="Modelo Cristão 5" data-codigo="cristao 5" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 6</span><img src="cristao6.png" alt="Modelo Cristão 6" data-codigo="cristao 6" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 7</span><img src="cristao7.png" alt="Modelo Cristão 7" data-codigo="cristao 7" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 8</span><img src="cristao8.png" alt="Modelo Cristão 8" data-codigo="cristao 8" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 9</span><img src="cristao9.png" alt="Modelo Cristão 9" data-codigo="cristao 9" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 10</span><img src="cristao10.png" alt="Modelo Cristão 10" data-codigo="cristao 10" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 11</span><img src="cristao11.png" alt="Modelo Cristão 11" data-codigo="cristao 11" onclick="abrirPopup(this)"></div>
            <div class="card-box"><span class="card-label">cristao 12</span><img src="cristao12.png" alt="Modelo Cristão 12" data-codigo="cristao 12" onclick="abrirPopup(this)"></div>
        </div>

        <!-- REMOVIDO: Botão Encomendar pelo WhatsApp -->
        <a href="index.html" class="btn-voltar" style="margin-top: 20px; margin-bottom: 0;">⬅️ Voltar ao Menu</a>
        
    </div>

    <!-- JANELA POP-UP DE COMPARTILHAMENTO -->
    <div class="popup-overlay" id="meuPopup">
        <div class="popup-box">
            <h3 style="margin-top:0; color:#1e293b; font-weight: 700;">Gostou deste modelo?</h3>
            <p style="color:#64748b; font-size: 15px; line-height: 1.5;">Clique abaixo para compartilhar este modelo diretamente com quem vai produzir seu card.</p>
            
            <!-- Botão modificado para realizar o compartilhamento nativo -->
            <button onclick="compartilharPedido()" class="btn-confirmar" style="width: 100%; border: none; cursor: pointer;">ENVIAR PEDIDO</button>
            
            <a href="#" onclick="fecharPopup()" class="btn-cancelar">Voltar e ver outros</a>
        </div>
    </div>

    <script>
        const popup = document.getElementById('meuPopup');
        let codigoSelecionado = ""; // Guarda o código do cartão temporariamente

        function abrirPopup(elemento) {
            codigoSelecionado = elemento.getAttribute('data-codigo');
            popup.style.display = 'flex';
        }

        function fecharPopup() {
            popup.style.display = 'none';
        }

        // Nova função de compartilhamento nativo independente
        async function compartilharPedido() {
            const textoMensagem = `Pedido:\n${codigoSelecionado}`;

            // Abre o painel de compartilhamento nativo do dispositivo (Android, iOS, etc.)
            if (navigator.share) {
                try {
                    await navigator.share({
                        text: textoMensagem
                    });
                    fecharPopup();
                } catch (err) {
                    console.log("Erro ao compartilhar: ", err);
                }
            } else {
                // Alternativa caso o navegador não tenha suporte nativo
                navigator.clipboard.writeText(textoMensagem);
                alert("Código copiado para a sua área de transferência! Cole na conversa com seu vendedor.");
                fecharPopup();
            }
        }

        // Fecha o pop-up ao clicar na área escura do fundo
        window.onclick = function(event) {
            if (event.target == popup) {
                fecharPopup();
            }
        }

        // BLOQUEIOS DE SEGURANÇA ANTICÓPIA
        document.addEventListener('contextmenu', event => event.preventDefault());

        document.querySelectorAll('.grid-fotos img').forEach(img => {
            img.addEventListener('dragstart', event => event.preventDefault());
        });
    </script>

</body>
</html>
